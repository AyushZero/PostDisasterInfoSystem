apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: disaster-platform
data:
  CORS_ORIGINS: '["http://localhost","https://disaster-platform.example.com"]'
  APP_NAME: "Post-Disaster Information and Alert Platform"
  DEBUG: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: disaster-platform
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@postgres-service:5432/disaster_platform"
  JWT_SECRET_KEY: "k8s-production-secret-change-this"
  POSTGRES_PASSWORD: "postgres"
